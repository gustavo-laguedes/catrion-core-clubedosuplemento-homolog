<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primeiro acesso - Catrion Core</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="first-access.css">
</head>
<body>
  <div class="fa-page">
    <div class="fa-card">

      <div class="fa-head">
        <img src="../../assets/core-topbar1.png" alt="Core" class="fa-logo">
        <h1>Primeiro acesso</h1>
        <p>Finalize seu cadastro para entrar no sistema</p>
      </div>

      <div class="fa-top">
        <div class="fa-avatar-block">
          <div id="faAvatarPreview" class="fa-avatar-preview">IMG</div>
          <input id="faAvatarFile" type="file" accept="image/*" hidden>
          <button id="faAvatarPick" type="button" class="fa-btn fa-btn-ghost fa-btn-avatar">
            Escolher foto
          </button>
        </div>

        <div class="fa-intro-card">
          <div class="fa-intro-title">Complete seu cadastro</div>
          <div class="fa-intro-text">
            Defina seu nome, sua senha de acesso e, se quiser, já adicione uma foto de perfil.
          </div>
        </div>
      </div>

      <div class="fa-grid">
        <div class="fa-field fa-field-full">
          <label>Nome completo</label>
          <input id="faFullName" type="text" placeholder="Digite seu nome completo">
        </div>

        <div class="fa-field fa-field-full">
          <label>E-mail</label>
          <input id="faEmail" type="email" readonly>
        </div>

        <div class="fa-field">
          <label>Senha</label>
          <input id="faPassword" type="password" placeholder="Digite sua nova senha">
        </div>

        <div class="fa-field">
          <label>Confirmar senha</label>
          <input id="faPasswordConfirm" type="password" placeholder="Confirme sua senha">
        </div>
      </div>

      <div id="faFeedback" class="hidden"></div>

      <button id="faSave" class="fa-btn fa-btn-primary fa-btn-save">
        Salvar e continuar
      </button>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../shared/env.js"></script>
  <script src="../../shared/supabaseClient.js"></script>
  <script src="first-access.js"></script>
</body>
</html>
